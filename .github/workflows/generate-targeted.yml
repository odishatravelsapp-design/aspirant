name: Targeted daily questions (education + IBPS GK)

# Every day: ~15 education questions for Odisha SSB / PGT + ~10 IBPS-style GK.
on:
  schedule:
    - cron: '15 1 * * *' # 06:45 IST daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aspirant-content
  cancel-in-progress: false

jobs:
  targeted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate targeted questions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EDU_COUNT: '15'
          GK_COUNT: '10'
        run: node scripts/generate-targeted.mjs
      - uses: ./.github/actions/safe-commit
        with:
          message: 'chore: daily education + IBPS GK questions'
