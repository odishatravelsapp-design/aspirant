name: Generate fresh questions (AI)

# Runs daily on a free GitHub-hosted runner: generates + self-verifies new
# questions with the Gemini free tier and commits them. The commit to main then
# triggers deploy.yml automatically. No server, no cost.
on:
  schedule:
    - cron: '30 0 * * *' # 06:00 IST daily (00:30 UTC)
  workflow_dispatch: # also runnable manually from the Actions tab

permissions:
  contents: write

# Serialize all content jobs so their commits never collide on push.
concurrency:
  group: aspirant-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate questions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QUESTIONS_PER_TOPIC: '2'
        run: node scripts/generate-questions.mjs
      - uses: ./.github/actions/safe-commit
        with:
          message: 'chore: daily AI question top-up'
