name: Daily current affairs

# Pulls real headlines + builds the daily current-affairs digest and quiz with
# the Gemini free tier, then commits. The commit to main triggers deploy.yml.
on:
  schedule:
    - cron: '0 1 * * *' # 06:30 IST daily (01:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aspirant-content
  cancel-in-progress: false

jobs:
  current-affairs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate current affairs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-current-affairs.mjs
      - uses: ./.github/actions/safe-commit
        with:
          message: 'chore: daily current affairs'
