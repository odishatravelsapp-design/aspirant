name: Ingest external questions

# Pulls extra GA/GK MCQs from free, openly-licensed APIs (Open Trivia DB) and
# commits them. Runs a few hours offset from the AI generator to spread load.
on:
  schedule:
    - cron: '0 2 * * *' # 07:30 IST daily (02:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Ingest questions
        env:
          INGEST_PER_EXAM: '10'
        run: node scripts/ingest-questions.mjs
      - name: Commit ingested questions
        run: |
          git config user.name "aspirant-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/questions
          if git diff --staged --quiet; then
            echo "No new questions today."
          else
            git commit -m "chore: ingest external GK questions"
            git push
          fi
