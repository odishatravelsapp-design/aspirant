name: Ingest external questions

# Pulls GA/GK MCQs from Open Trivia DB. DISABLED on a schedule because the
# content is generic Western trivia, not exam-relevant — the AI generators
# produce far better questions. Kept as a manual (workflow_dispatch) option only.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aspirant-content
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Ingest questions
        env:
          INGEST_PER_EXAM: '10'
        run: node scripts/ingest-questions.mjs
      - uses: ./.github/actions/safe-commit
        with:
          message: 'chore: ingest external GK questions'
