name: Predicted questions (weekly)

# Once a week, generates "most-expected" questions for each exam's highest-
# weightage past-paper topics. Output is pending approval before students see it.
on:
  schedule:
    - cron: '0 3 * * 0' # Sundays 08:30 IST (03:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate predicted questions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PREDICT_PER_TOPIC: '2'
        run: node scripts/generate-predicted.mjs
      - name: Commit predicted questions
        run: |
          git config user.name "aspirant-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/questions
          if git diff --staged --quiet; then
            echo "No predictions generated."
          else
            git commit -m "chore: weekly predicted questions"
            git push
          fi
