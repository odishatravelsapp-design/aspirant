name: Safe commit & push
description: Commit changes under public/data and push, rebasing on concurrent pushes.
inputs:
  message:
    description: Commit message
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        git config user.name "aspirant-bot"
        git config user.email "bot@users.noreply.github.com"
        git add public/data
        if git diff --staged --quiet; then
          echo "No changes to commit."
          exit 0
        fi
        git commit -m "${{ inputs.message }}"
        # Retry with rebase so concurrent daily jobs don't lose pushes.
        for i in 1 2 3 4 5; do
          if git pull --rebase --autostash origin main && git push; then
            echo "Pushed on attempt $i."
            exit 0
          fi
          echo "Push race — retrying ($i)…"
          sleep $((RANDOM % 8 + 3))
        done
        echo "Push failed after retries."
        exit 1
